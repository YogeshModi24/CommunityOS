services:
  - type: web
    name: community-os-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx turbo run build --filter=api --concurrency=1
    startCommand: npm run start --workspace=api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false

  - type: worker
    name: community-os-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx turbo run build --filter=worker --concurrency=1
    startCommand: npm run start --workspace=worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromService:
          name: community-os-api
          type: web
          envVarKey: MONGODB_URI
      - key: REDIS_URL
        fromService:
          name: community-os-api
          type: web
          envVarKey: REDIS_URL
      - key: OPENAI_API_KEY
        fromService:
          name: community-os-api
          type: web
          envVarKey: OPENAI_API_KEY
